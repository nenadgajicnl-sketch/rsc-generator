<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RSC Generator — AK Invest</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js" onerror="console.log('jsdelivr docx failed')"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;min-height:100vh}
.app{max-width:820px;margin:0 auto;padding:20px 14px}
.header{background:linear-gradient(135deg,#1a3a5c,#2563a8);color:#fff;padding:18px 22px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.card{background:#fff;border:1px solid #e0e7ef;border-radius:10px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-green{background:#f0faf0;border:1px solid #b7ddb7}
.card-blue{border-left:4px solid #1a3a5c}
.card-green2{border-left:4px solid #2e7d32}
.card-orange{border-left:4px solid #e67e22}
.card-purple{border-left:4px solid #9c27b0}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#555;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s}
.tab.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.tab:hover:not(.active){background:#f0f2f5}
.section-hdr{font-size:11px;font-weight:700;color:#fff;background:#1a3a5c;padding:4px 10px;border-radius:5px;margin-bottom:12px;display:inline-block;text-transform:uppercase;letter-spacing:.5px}
label{display:block;font-size:11px;color:#666;margin-bottom:3px;font-weight:600}
input,select,textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #d0d7de;font-size:13px;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563a8;box-shadow:0 0 0 2px rgba(37,99,168,.1)}
input.auto{border-color:#b7ddb7;background:#f6fdf6}
textarea{resize:vertical;min-height:56px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.btn-primary{background:#1a3a5c;color:#fff;border:none;padding:10px 26px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;transition:background .15s}
.btn-primary:hover{background:#2563a8}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-sec{background:transparent;color:#1a3a5c;border:1.5px solid #1a3a5c;padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-green{background:#2e7d32;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700}
.btn-purple{background:#9c27b0;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700}
.btn-copy{background:transparent;border:1px solid #ccc;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;color:#555}
.btn-copy.ok{background:#e6f4ea;color:#2e7d32;border-color:#b7ddb7}
.rsc-block{background:#fff;border:1px solid #d0d7de;border-radius:10px;padding:16px 18px;margin-bottom:14px;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.del-btn{position:absolute;top:12px;right:14px;background:none;border:none;cursor:pointer;color:#ccc;font-size:20px;line-height:1;transition:color .1s}
.del-btn:hover{color:#e53935}
.add-rsc{width:100%;padding:12px;border:2px dashed #2563a8;border-radius:8px;background:#f0f6ff;cursor:pointer;color:#2563a8;font-size:14px;font-family:inherit;margin-bottom:14px;transition:all .15s;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
.add-rsc:hover{background:#dbeafe;border-color:#1a3a5c;color:#1a3a5c}
.auto-hint{font-size:11px;color:#2e7d32;margin-top:4px;font-weight:600}
.badge{font-size:11px;background:#e8f0fe;color:#1a73e8;padding:2px 8px;border-radius:10px;margin-left:6px}
.pre-box{background:#f4f7fb;border:1px solid #e0e7ef;border-radius:8px;padding:14px 16px;font-size:12px;font-family:monospace;white-space:pre-wrap;max-height:280px;overflow-y:auto;line-height:1.65;color:#222}
.sep{border:none;border-top:1px solid #e0e7ef;margin:14px 0}
table.hist{width:100%;border-collapse:collapse;font-size:12px}
table.hist th{background:#1a3a5c;color:#fff;padding:7px 9px;text-align:left;font-weight:600}
table.hist td{padding:6px 9px;border:1px solid #eee}
table.hist tr:nth-child(even){background:#f9f9f9}
.counter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:16px}
.counter-card{background:#fff;border:1px solid #e0e7ef;border-radius:8px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.counter-card .type{font-size:20px;font-weight:700;color:#1a3a5c}
.counter-card .nums{font-size:11px;color:#666;margin-top:4px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-area{display:flex;align-items:center;gap:14px}
.frow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fw{font-weight:700}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div style="font-size:32px">🏗️</div>
  <div>
    <h1>RSC Document Generator</h1>
    <p>AK Invest DOOEL Tetovo — North Macedonia Corridor 8 &amp; 10-D</p>
  </div>
</div>

<!-- Excel upload -->
<div class="card" id="excel-card">
  <div class="upload-area">
    <span style="font-size:26px">📊</span>
    <div style="flex:1">
      <div class="fw" id="excel-title" style="font-size:13px">Прикачи RSC_Generator Excel</div>
      <div id="excel-subtitle" style="font-size:11px;color:#888">За автоматски сериски броеви — RSC_Generator_FINAL_v3.xlsx</div>
    </div>
    <button class="btn-primary" id="excel-btn" onclick="document.getElementById('excelFile').click()">Прикачи .xlsx</button>
    <input type="file" id="excelFile" accept=".xlsx" style="display:none" onchange="handleExcel(this)"/>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-input" onclick="switchTab('input')">📝 Внес</button>
  <button class="tab" id="tab-output" onclick="switchTab('output')">📤 Излез</button>
  <button class="tab" id="tab-history" onclick="switchTab('history')" style="display:none">📋 Историја</button>
</div>

<!-- INPUT -->
<div id="pane-input">
  <div id="rsc-list"></div>
  <button class="add-rsc" onclick="addRSC()" id="add-rsc-btn">
    <span style="font-size:18px;line-height:1;margin-right:6px">+</span> Додај уште еден RSC
  </button>
  
  <div class="card">
    <div class="section-hdr">⚙️ Поставки</div>
    <div class="grid3">
      <div><label>Датум на нотификација</label><input type="date" id="notif-date"/></div>
      <div><label>Email примач</label><input id="recipient" value="Emil" placeholder="Emil"/></div>
      <div><label>Тип на email</label>
        <select id="email-type">
          <option value="submittal">Submittal</option>
          <option value="resubmittal">Resubmittal</option>
        </select>
      </div>
    </div>
  </div>
  
  <button class="btn-primary" id="gen-btn" onclick="generate()">⚡ Генерирај ги документите</button>
</div>

<!-- OUTPUT -->
<div id="pane-output" style="display:none">
  <div id="output-content"><p style="color:#888;font-size:13px;padding:20px 0">Нема уште — пополни го формуларот и кликни Генерирај.</p></div>
</div>

<!-- HISTORY -->
<div id="pane-history" style="display:none">
  <div id="history-content"></div>
</div>

</div>

function padSeq(n){return String(n).padStart(5,"0");}
function buildRSCNo(loc, prefix, type, seq){return `26437-RSC-04C-UT-${type}-${prefix}-${padSeq(seq)}`;}


function getDateLabel(){
  const v = document.getElementById("notif-date").value;
  if(!v) return "[DATE]";
  const d = new Date(v);
  return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
}

function switchTab(t){
  ["input","output","history"].forEach(n=>{
    document.getElementById("pane-"+n).style.display = n===t?"block":"none";
    document.getElementById("tab-"+n).classList.toggle("active", n===t);
  });
}

// ── Excel ──
function handleExcel(input){
  const file = input.files[0]; if(!file) return;
  excelFileName = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, {type:"array"});
    // Find sheets by name (handle Cyrillic)
    const sheetNames = wb.SheetNames;
    console.log("Sheets found:", sheetNames);
    
    const broSheet = wb.Sheets["BROJACI"];
    const lokSheet = wb.Sheets["LOKACII"];
    const vnesSheet = wb.Sheets["VNES"];
    
    // Use named headers for reliability
    const brows = broSheet ? XLSX.utils.sheet_to_json(broSheet) : [];
    const lrows = lokSheet ? XLSX.utils.sheet_to_json(lokSheet) : [];
    const vrows = vnesSheet ? XLSX.utils.sheet_to_json(vnesSheet) : [];
    
    console.log("BROJACI rows:", brows.slice(0,3));
    console.log("LOKACII rows:", lrows.slice(0,3));
    console.log("VNES rows:", vrows.slice(0,3));
    
    const brojaci={}, lokacii={};
    
    // BROJACI: columns: Тип, Последен Број, Последен Број IR, Последен Број WS
    brows.forEach(r=>{
      const tip = r["Тип"] || r["Tip"] || r["Type"];
      if(!tip) return;
      // Try Cyrillic column names first, then index-based fallback
      const last = r["Последен Број"] || 0;
      const lastIR = r["Последен Број IR"] || 0;
      const lastWS = r["Последен Број WS"] || 0;
      brojaci[tip] = {last, lastIR, lastWS};
    });
    
    // LOKACII: columns: Локација (KM), Префикс  
    lrows.forEach(r=>{
      const loc = r["Локација (KM)"] || r["Lokacija (KM)"];
      const prefix = r["Префикс"] || r["Prefiks"];
      if(loc) lokacii[loc] = prefix;
    });
    
    // VNES: Дата, Локација (KM), Тип, Број., RSC код, Префикс
    const vnes = vrows.filter(r=>r["Дата"]||r["Data"]).map(r=>({
      date: r["Дата"] || r["Data"] || "",
      loc:  r["Локација (KM)"] || r["Lokacija (KM)"] || "",
      type: r["Тип"] || r["Tip"] || "",
      num:  r["Број."] || r["Broj."] || 0,
      code: r["RSC код"] || r["RSC kod"] || "",
      prefix: r["Префикс"] || r["Prefiks"] || "",
    }));
    
    console.log("Parsed brojaci:", brojaci);
    console.log("Parsed lokacii:", lokacii);
    
    excelData = {brojaci, lokacii, vnes};
    
    document.getElementById("excel-card").className="card card-green";
    document.getElementById("excel-title").innerHTML=`<span style="color:#2e7d32">✓ ${file.name}</span>`;
    document.getElementById("excel-subtitle").textContent=`${Object.keys(brojaci).length} типови · ${Object.keys(lokacii).length} локации · ${vnes.length} записи`;
    document.getElementById("excel-btn").textContent="Смени";
    document.getElementById("excel-btn").className="btn-sec";
    document.getElementById("tab-history").style.display="";
    
    // Refresh all RSC forms to show location dropdown
    const ids = [...rscList];
    document.getElementById("rsc-list").innerHTML="";
    rscList=[];
    if(ids.length===0) addRSC(); else ids.forEach(()=>addRSC());
  };
  reader.readAsArrayBuffer(file);
}

// ── RSC Form ──

function syncEndCh(el, id) {
  el.value = el.value.toUpperCase();
  var e = document.getElementById('endch-'+id);
  if(e) e.value = el.value;
}

function buildLocDropdown(id) {
  if(!excelData) return "";
  const lokOptions = Object.keys(excelData.lokacii).map(k=>"<option value=\""+k+"\">"+k+" ("+excelData.lokacii[k]+")</option>").join("") + "<option value=\"manual\">✏ Рачно внесување</option>";
  return "<div style=\"margin-bottom:12px\"><label>📍 Локација (автоматски број)</label><select id=\"loc-"+id+"\" class=\"auto\" onchange=\"onLocChange("+id+")\"><option value=\"\">— Избери локација —</option>"+lokOptions+"</select><div class=\"auto-hint\" id=\"auto-hint-"+id+"\"></div></div>";
}

function addRSC(){
  rscCounter++;
  const id = rscCounter;
  rscList.push(id);

  const insOptions = Object.entries(INSPECTION_CODES).map(([k,v])=>'<option value="'+k+'">'+v+'</option>').join('');

  let html = '<div class="rsc-block" id="rscblock-'+id+'">';
  
  // Header row
  html += '<div class="frow" style="justify-content:space-between;margin-bottom:12px">';
  html += '<span class="section-hdr">RSC #'+rscList.length+'</span>';
  if(rscList.length > 1) html += '<button class="del-btn" onclick="delRSC('+id+')">×</button>';
  html += '</div>';

function onLocChange(id){
  if(!excelData) return;
  const loc = document.getElementById("loc-"+id).value;
  const type = document.getElementById("inscode-"+id).value;
  autoFill(id, loc, type);
}

function onInsChange(id){
  const el = document.getElementById("inscodeother-"+id);
  if(el) el.disabled = document.getElementById("inscode-"+id).value !== "OTHER";
  if(excelData){
    const locEl = document.getElementById("loc-"+id);
    const loc = locEl ? locEl.value : "";
    const type = document.getElementById("inscode-"+id).value;
    autoFill(id, loc, type);
  }
  onSeqChange(id);
  updateMSC(id);
  updateInsCodeFull(id);
}

function autoFill(id, loc, type){
  if(!loc || loc==="manual" || !type || type==="OTHER" || !excelData) return;
  const prefix = excelData.lokacii[loc] || "IR";
  const counts = excelData.brojaci[type];
  const nextSeq = counts ? ((prefix==="IR" ? counts.lastIR : counts.lastWS)||0)+1 : 1;
  const rscno = `${type}-${prefix}-${padSeq(nextSeq)}`;
  
  const rscnoEl = document.getElementById("rscno-"+id);
  const seqEl = document.getElementById("seqcode-"+id);
  const detEl = document.getElementById("detcode-"+id);
  const hintEl = document.getElementById("auto-hint-"+id);
  
  if(rscnoEl){ rscnoEl.value=rscno; rscnoEl.className="auto"; }
  if(seqEl){ seqEl.value=padSeq(nextSeq); seqEl.className="auto"; }
  if(detEl) detEl.value=prefix;
  if(hintEl) hintEl.textContent=`✓ Автоматски: ${rscno} (Seq: ${nextSeq})`;
  updateDescPrefix(id);
}

function onSeqChange(id){
  const seq = document.getElementById("seqcode-"+id).value.trim();
  const type = document.getElementById("inscode-"+id).value;
  const det = document.getElementById("detcode-"+id).value;
  if(seq && type && type!=="OTHER" && det){
    const rscnoEl = document.getElementById("rscno-"+id);
    rscnoEl.value = `26437-RSC-04C-UT-${type}-${det}-${seq}`;
  }
}

function getRSCData(id){
  const g = sel => { const e=document.getElementById(sel+"-"+id); return e?e.value.trim():""; };
  const locEl = document.getElementById("loc-"+id);
  const startch = locEl ? (locEl.value==="manual" ? "" : locEl.value) : g("startch");
  return {
    id, rscno:(()=>{const v=g("rscno");return v.startsWith("26437-RSC-04C-UT-")?v:"26437-RSC-04C-UT-"+v;})(), docdate:g("docdate"),
    inscode:g("inscode"), inscodeother:g("inscodeother"), inscodefull:getFullInsCode(id),
    detcode:g("detcode"), seqcode:g("seqcode"),
    section:g("section"), object:g("object"),
    startch, endch:g("endch"), side:g("side"),
    estdt:g("estdt"), desc:getFullDesc(id),
    msc:g("msc"), dwg:g("dwg"), qcp:g("qcp"),
    _autoType:g("inscode"), _autoPrefix:g("detcode"),
    _autoSeq:parseInt(g("seqcode"))||0
  };
}

// ── DOCX Generation ──
async function downloadDocx(idx){
  const r = window._currentRSCs[idx];
  if(typeof JSZip === 'undefined'){ alert("JSZip не е вчитана. Отвори преку Netlify линкот, не локално."); return; }
  
  const INS_FULL = {
    ZRM:"ZRM – Zero Measurement", EXC:"EXC- Excavation",
    GEM:"GEM- Geomechanics-Work/Test", IN1:"IN1-In situ rebar formwork",
    IN2:"IN2-In situ concreting", IST:"IST - Installation - Geotextile",
    WP3:"WP3-Pile Foundation Waterproofing – bituminous emulsion",
    INS:"INS – Installation Works", GEO:"GEO – Geomechanics Works",
  };
  const DET_FULL = {IR:"IR-Irrigation", WS:"WS-Water Supply"};
  
  const insCode = r.inscodefull || INS_FULL[r.inscode] || r.inscode;
  const detCode = DET_FULL[r.detcode] || r.detcode;
  
  // Decode template
  const binary = atob(DOCX_TEMPLATE_B64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  
  const zip = await JSZip.loadAsync(bytes);
  let xml = await zip.file("word/document.xml").async("string");
  
  // Simple placeholder replacement - template has clean single-run placeholders
  const map = {
    "{{INS_CODE}}": insCode,
    "{{DET_CODE}}": detCode,
    "{{SEQ_CODE}}": r.seqcode,
    "{{RSC_NO}}": r.rscno,
    "{{DOC_DATE}}": r.docdate,
    "{{SECTION}}": r.section,
    "{{OBJECT}}": r.object,
    "{{START_CH}}": r.startch,
    "{{END_CH}}": r.endch,
    "{{SIDE}}": r.side,
    "{{DESC}}": r.desc,
    "{{MSC}}": r.msc,
    "{{DWG}}": r.dwg,
    "{{QCP}}": r.qcp,
    "{{EST_DT}}": r.estdt,
  };
  
  Object.entries(map).forEach(([k,v]) => {
    xml = xml.split(k).join(v || "");
  });
  
  zip.file("word/document.xml", xml);
  
  const blob = await zip.generateAsync({
    type:"blob",
    mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`${r.rscno||"RSC"}.docx`; a.click();
  URL.revokeObjectURL(url);
}

  // Title
  doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.text("DAILY INSPECTION NOTIFICATION LIST", PW/2, MT + 32, {align:"center"});
  doc.text("UTILITIES", PW/2, MT + 38, {align:"center"});

  // ── Table ──
  const COL_WIDTHS = [6, 45, 16, 14, 14, 14, 22, 0, 26]; 
  // last col (Item Description) gets remaining space
  const fixedW = COL_WIDTHS.slice(0,-1).reduce((a,b)=>a+b,0) + COL_WIDTHS[COL_WIDTHS.length-1];
  COL_WIDTHS[7] = TW - fixedW; // Item Description gets the rest (~140mm)

  const HEADERS = ["#", "RSC doc no.", "Section", "Object", "From", "To", "Side/Element", "Item Description", "Estimated time and date"];

  // Build body - always 17 rows
  function fmtEstDt(s) {
    if(!s) return "";
    // Convert 01/06/2026 13:30 -> 1.6.2026 13:30
    return s.replace(/^0?(\d+)\/0?(\d+)\/(\d+)\s*(.*)/, (m,d,mo,y,t) => `${parseInt(d)}.${parseInt(mo)}.${y}${t?" "+t:""}`);
  }
  function kmStrip(s) {
    if(!s) return "";
    return s.replace(/^KM\s*/i,"").trim();
  }

  const dataRows = rscs.map((r,i) => [
    i+1,
    r.rscno,
    "Section 4",
    kmStrip(r.startch),
    kmStrip(r.startch),
    kmStrip(r.endch),
    r.side,
    r.desc,
    fmtEstDt(r.estdt)
  ]);

  // Pad to 17
  while(dataRows.length < 17) {
    dataRows.push([dataRows.length+1, "", "", "", "", "", "", "", ""]);
  }

  doc.autoTable({
    startY: MT + 42,
    margin: {left: ML, right: MR},
    tableWidth: TW,
    head: [HEADERS],
    body: dataRows,
    styles: {
      fontSize: 6.5,
      font: "helvetica",
      cellPadding: 1.5,
      overflow: "linebreak",
      valign: "middle",
      lineWidth: 0.2,
      lineColor: [0,0,0],
    },
    headStyles: {
      fillColor: [255,255,255],
      textColor: [0,0,0],
      fontStyle: "bold",
      halign: "center",
      lineWidth: 0.3,
      lineColor: [0,0,0],
      minCellHeight: 8,
    },
    columnStyles: {
      0: {cellWidth: COL_WIDTHS[0], halign:"center"},
      1: {cellWidth: COL_WIDTHS[1]},
      2: {cellWidth: COL_WIDTHS[2], halign:"center"},
      3: {cellWidth: COL_WIDTHS[3], halign:"center"},
      4: {cellWidth: COL_WIDTHS[4], halign:"center"},
      5: {cellWidth: COL_WIDTHS[5], halign:"center"},
      6: {cellWidth: COL_WIDTHS[6], halign:"center"},
      7: {cellWidth: COL_WIDTHS[7]},
      8: {cellWidth: COL_WIDTHS[8], halign:"center"},
    },
    didParseCell: function(data) {
      // Empty rows - set min height
      if(data.row.index >= rscs.length) {
        data.cell.styles.minCellHeight = 7;
      }
    },
    theme: "grid",
  });

  // Footer
  doc.setFontSize(6.5); doc.setFont("helvetica","normal");
  doc.text("Level 3 - BEJV Internal | BEJV Data Sensitivity Level", ML, PH - 3);
  doc.text("1 of 1", PW - MR, PH - 3, {align:"right"});

  doc.save(`Daily_Notification_Invitation_List_${dateLabel}.pdf`);
}

// ── Excel export ──
function exportExcel(){
  if(!excelData) return;
  const rscs = window._currentRSCs;
  const wb = XLSX.utils.book_new();
  const newBro = JSON.parse(JSON.stringify(excelData.brojaci));
  
  rscs.forEach(r=>{
    if(!r._autoSeq || r.inscode==="OTHER") return;
    const type = r._autoType||r.inscode;
    const prefix = r._autoPrefix||r.detcode;
    if(!newBro[type]) newBro[type]={last:0,lastIR:0,lastWS:0};
    newBro[type].last = Math.max(newBro[type].last, r._autoSeq);
    if(prefix==="IR") newBro[type].lastIR = Math.max(newBro[type].lastIR, r._autoSeq);
    else newBro[type].lastWS = Math.max(newBro[type].lastWS, r._autoSeq);
  });
  
  const broData=[["Тип","Последен Број","Последен Број IR","Последен Број WS"]];
  Object.entries(newBro).forEach(([k,v])=>broData.push([k,v.last,v.lastIR,v.lastWS]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(broData), "BROJACI");
  
  const today=new Date();
  const ts=`${String(today.getDate()).padStart(2,"0")}.${String(today.getMonth()+1).padStart(2,"0")}.${today.getFullYear()}`;
  const vnesData=[["Дата","Локација (KM)","Тип","Број.","RSC код","Префикс"]];
  excelData.vnes.forEach(r=>vnesData.push([r.date,r.loc,r.type,r.num,r.code,r.prefix]));
  rscs.forEach(r=>{
    const type=r.inscode==="OTHER"?(r.inscodeother||"OTHER"):r.inscode;
    const seq=r._autoSeq||parseInt(r.seqcode)||0;
    const prefix=r._autoPrefix||r.detcode;
    const code=`${r.startch.replace("KM ","")}-${prefix}-${type}-${padSeq(seq)}`;
    vnesData.push([ts, r.startch, type, seq, code, prefix]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(vnesData), "VNES");
  
  const lokData=[["Локација (KM)","Префикс"]];
  Object.entries(excelData.lokacii).forEach(([k,v])=>lokData.push([k,v]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(lokData), "LOKACII");
  
  XLSX.writeFile(wb, excelFileName||"RSC_Generator_updated.xlsx");
}

};

function descKeydown(e, id) {
  if(e.key !== "Tab") return;
  const ta = e.target;
  const pos = ta.selectionStart;
  const text = ta.value.substring(0, pos);
  
  // Get last word typed
  const match = text.match(/([a-zA-Z0-9]+)$/);
  if(!match) return;
  
  const word = match[1].toLowerCase();
  const expansion = SHORTCUTS[word];
  if(!expansion) return;
  
  e.preventDefault();
  const before = text.substring(0, text.length - match[1].length);
  const after = ta.value.substring(pos);
  ta.value = before + expansion + after;
  const newPos = before.length + expansion.length;
  ta.setSelectionRange(newPos, newPos);
}

// ── Smart Date Parser ──
function smartDate(val) {
  // Remove all non-digit chars except dots and spaces
  const clean = val.replace(/[^0-9.\/\s]/g, '').trim();
  if(!clean) return val;
  
  // Split by dot, slash, or space
  const parts = clean.split(/[.\/\s]+/).filter(Boolean);
  if(parts.length < 2) return val;
  
  const d = parts[0].padStart(2,'0');
  const m = parts[1].padStart(2,'0');
  let y = parts[2] || '';
  
  // Handle year: 26 -> 2026, 2026 stays
  if(y.length === 2) y = '20' + y;
  else if(!y) y = new Date().getFullYear().toString();
  
  return `${d}/${m}/${y}`;
}

function smartDateTime(val) {
  // Format: "2.6.26 10:00" or "2.6 10:00" or just date
  const timeMatch = val.match(/([0-9]{1,2}[:h][0-9]{0,2})$/);
  const time = timeMatch ? timeMatch[1].replace('h',':') : '';
  const datePart = val.replace(timeMatch ? timeMatch[0] : '', '').trim();
  
  const clean = datePart.replace(/[^0-9.\/\s]/g, '').trim();
  const parts = clean.split(/[.\/\s]+/).filter(Boolean);
  if(parts.length < 2) return val;
  
  const d = parts[0].padStart(2,'0');
  const m = parts[1].padStart(2,'0');
  let y = parts[2] || '';
  if(y.length === 2) y = '20' + y;
  else if(!y) y = new Date().getFullYear().toString();
  
  const dateStr = `${d}/${m}/${y}`;
  return time ? `${dateStr} ${time.padEnd(5,'0').replace(/:(\d)$/,':0$1')}` : dateStr;
}

function buildEstDt(id) {
  const d = document.getElementById("estdt-date-"+id);
  const t = document.getElementById("estdt-time-"+id);
  const h = document.getElementById("estdt-"+id);
  if(!d || !t || !h) return;
  const dateVal = d.value.trim();
  const timeVal = t.value.trim();
  h.value = dateVal && timeVal ? dateVal+" "+timeVal : dateVal || timeVal;
}

function applySmartDate(el) {
  const v = el.value;
  if(!v) return;
  el.value = smartDate(v);
}

function applySmartDateTime(el) {
  const v = el.value;
  if(!v) return;
  el.value = smartDateTime(v);
}

    html+=`<div class="counter-card"><div class="type">${type}</div><div class="nums">IR: <b>${v.lastIR}</b> &nbsp;·&nbsp; WS: <b>${v.lastWS}</b></div></div>`;
  });
  html+='</div><div style="font-size:13px;font-weight:700;margin-bottom:8px">Последни записи</div>';
  html+='<div style="overflow-x:auto"><table class="hist"><thead><tr><th>Дата</th><th>Локација</th><th>Тип</th><th>Број</th><th>RSC Код</th><th>Пре.</th></tr></thead><tbody>';
  [...excelData.vnes].reverse().forEach((row,i)=>{
    html+=`<tr><td>${row.date}</td><td>${row.loc}</td><td><span class="badge">${row.type}</span></td><td style="text-align:center">${row.num}</td><td style="font-family:monospace;font-size:11px">${row.code}</td><td>${row.prefix}</td></tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById("history-content").innerHTML=html;
}
